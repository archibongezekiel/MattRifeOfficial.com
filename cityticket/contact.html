      <section>
        <div id="container">
          <div id="contact-title">
            <h1 id="title">Contact Information</h1>
          </div>
          <!-- first name -->
          <div id="firstName-container">
            <label for="firstName" id="firstName-label">First name</label>
            <input
              type="text"
              name="firstName"
              id="firstName"
              placeholder="First Name"
              required
            />
          </div>
          <!-- last name -->
          <div id="lasttName-container">
            <label for="firstName" id="lastName-label">Last name</label>
            <input
              type="text"
              name="lastName"
              id="lastName"
              placeholder="Last Name"
              required
            />
          </div>
          <!-- email  -->
          <div id="email-container">
            <label for="email" id="email-label">Email</label>
            <input
              type="text"
              name="Email"
              id="email"
              placeholder="Email"
              required
            />
          </div>
          <!-- confirm email -->
          <div id="confirm-email-container">
            <label for="conEmail" id="conEamil-label"
              >Confirm Email address</label
            >
            <input
              type="text"
              name="conEmail"
              id="conEmail"
              placeholder="Confirm Email Address"
              required
            />
          </div>
          <!-- phone number -->
          <!-- confirm email -->
          <div id="phone-container">
            <label for="phone-number" id="phone-label">Phone number</label>
            <span style="display: flex; align-items: center">
              <select name="" id="number-code">
                <option value="">+1</option>
              </select>
              <input
                type="text"
                name="phone"
                id="phone-number"
                placeholder="Phone number"
                required
              />
            </span>
          </div>
          <!--  -->
          <!--  -->
          <div id="payment-button-container">
            <button id="button" onclick="save()">Make payment</button>

            <img src="paypal.png" alt="" id="paypal-logo" />
            <!-- email confirmation  instruction message-->
            <div id="instruction-message-container">
              <svg
                width="20px"
                height="20px"
                viewBox="0 0 24 24"
                fill="none"
                id="instruction-message-logo"
                xmlns="http://www.w3.org/2000/svg"
                stroke=" rgb(2, 77, 223"
              >
                <g id="SVGRepo_bgCarrier" stroke-width="0" />

                <g
                  id="SVGRepo_tracerCarrier"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />

                <g id="SVGRepo_iconCarrier">
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zm-1.5-5.009c0-.867.659-1.491 1.491-1.491.85 0 1.509.624 1.509 1.491 0 .867-.659 1.509-1.509 1.509-.832 0-1.491-.642-1.491-1.509zM11.172 6a.5.5 0 0 0-.499.522l.306 7a.5.5 0 0 0 .5.478h1.043a.5.5 0 0 0 .5-.478l.305-7a.5.5 0 0 0-.5-.522h-1.655z"
                    fill="#000000"
                  />
                </g>
              </svg>
              <p id="instruction-message">
                Tickets will only be sent to the email address you provide here
              </p>
            </div>
          </div>

          <!--  -->
          <!--  -->
        </div>
